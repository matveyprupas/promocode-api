services:
  postgres:
    image: postgres:16-alpine
    container_name: promocode-api-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: promocode
      POSTGRES_PASSWORD: promocode_dev
      POSTGRES_DB: promocode
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
